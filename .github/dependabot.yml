version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: ⬆
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        patterns: ["*"]

  # Python (uv)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: ⬆
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]
      python-major:
        update-types: ["major"]
